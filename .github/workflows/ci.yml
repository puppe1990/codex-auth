name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.15.1

      - name: Zig version
        run: zig version

      - name: Test
        run: zig build test

      - name: Build release binary
        run: zig build -Doptimize=ReleaseSafe

      - name: Package artifact (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ASSET_NAME="codex-auth-${{ runner.os }}-${{ runner.arch }}.tar.gz"
          mkdir -p dist
          cp zig-out/bin/codex-auth dist/codex-auth
          tar -czf "${ASSET_NAME}" -C dist codex-auth
          echo "ASSET_NAME=${ASSET_NAME}" >> "$GITHUB_ENV"

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $assetName = "codex-auth-${{ runner.os }}-${{ runner.arch }}.zip"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item zig-out/bin/codex-auth.exe dist/codex-auth.exe
          Compress-Archive -Path dist/codex-auth.exe -DestinationPath $assetName -Force
          "ASSET_NAME=$assetName" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ env.ASSET_NAME }}

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: build-test
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: release-assets/*
